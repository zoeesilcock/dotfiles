# Customize prefix.
unbind C-b
set -g prefix C-a

# 256-color mode.
set -g default-terminal "screen-256color"
set -as terminal-overrides ",xterm*:Tc"

# Enable mouse
set -g mouse on

# Use vi keybindings
setw -g mode-keys vi

# Enable extended key sequences.
set-option -g extended-keys on
set -g extended-keys-format csi-u

# Make tmux work better with neovim.
set-option -sg escape-time 10
set-option -g focus-events on

# Don't use a login shell.
set -g default-command "${SHELL}"

# Open new panes in same path.
bind s split-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Sessions.
bind C-n new-session
bind C-x confirm-before -p "End session #S? (y/n)" "run-shell 'tmux switch-client -l || tmux switch-client -n' ; kill-session"
bind C-p choose-tree -s
bind C-a switch-client -l

# Select panes with vi-style movement commands.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vi-style movement commands.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload .tmux.conf with "r".
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Clear the screen and history.
bind-key -n C-k send-keys C-l \; send-keys -R \; clear-history
